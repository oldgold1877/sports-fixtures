<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Fixtures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0d0d0d;
    --surface: #161616;
    --border:  #242424;
    --accent:  #e8ff47;
    --accent2: #47c8ff;
    --green:   #00ff88;
    --text:    #f0f0f0;
    --muted:   #888;
    --dim:     #444;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; font-weight:300; min-height:100vh; }

  header { border-bottom:1px solid var(--border); padding:18px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; position:sticky; top:0; background:rgba(13,13,13,0.96); backdrop-filter:blur(8px); z-index:100; }
  .logo { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:1.4rem; letter-spacing:0.08em; text-transform:uppercase; }
  .logo span { color:var(--accent); }
  #last-scraped { font-size:0.75rem; color:var(--muted); }
  #last-scraped b { color:var(--accent2); font-weight:500; }

  #filter-bar { padding:12px 32px; border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  #search { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:7px 14px; font-family:'Barlow',sans-serif; font-size:0.85rem; border-radius:4px; width:280px; outline:none; transition:border-color 0.2s; }
  #search:focus { border-color:var(--accent); }
  #search::placeholder { color:var(--dim); }
  #match-count { font-size:0.75rem; color:var(--muted); }

  #app { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 104px); }

  #sidebar { border-right:1px solid var(--border); padding:16px 0; position:sticky; top:57px; height:calc(100vh - 57px); overflow-y:auto; }
  #sidebar::-webkit-scrollbar { width:3px; }
  #sidebar::-webkit-scrollbar-thumb { background:var(--border); }
  .sidebar-heading { font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); padding:0 18px 8px; }
  .cat-btn { display:flex; align-items:center; justify-content:space-between; width:100%; background:none; border:none; cursor:pointer; color:var(--text); font-family:'Barlow',sans-serif; font-size:0.8rem; padding:7px 18px; text-align:left; transition:background 0.15s; border-left:3px solid transparent; }
  .cat-btn:hover { background:var(--surface); }
  .cat-btn.active { background:var(--surface); border-left-color:var(--accent); color:var(--accent); font-weight:500; }
  .cat-btn.empty { color:var(--dim); }
  .cat-count { background:var(--border); color:var(--muted); font-size:0.65rem; padding:1px 6px; border-radius:10px; font-weight:500; flex-shrink:0; }
  .cat-btn.active .cat-count { background:var(--accent); color:#000; }
  .cat-btn.empty .cat-count { background:transparent; color:var(--dim); }

  #content { padding:28px 36px; }
  #category-title { font-family:'Barlow Condensed',sans-serif; font-size:2rem; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:4px; }
  #category-meta { font-size:0.75rem; color:var(--muted); margin-bottom:22px; padding-bottom:18px; border-bottom:1px solid var(--border); }
  #category-meta b { color:var(--accent2); }

  /* Plain fixture rows */
  .fixtures-list { display:flex; flex-direction:column; gap:2px; }
  .fixture-row { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--border); padding:13px 16px; border-radius:3px; font-size:0.84rem; line-height:1.5; transition:border-color 0.15s,background 0.15s; animation:fadeIn 0.2s ease both; }
  .fixture-row:hover { border-left-color:var(--accent); background:#1b1b1b; }
  .fixture-channel { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:0.76rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--accent2); margin-bottom:3px; }
  .fixture-match { font-weight:500; color:var(--text); font-size:0.88rem; }
  .fixture-match .vs { color:var(--accent); font-weight:700; }
  .fixture-times { margin-top:5px; font-size:0.75rem; color:var(--muted); display:flex; flex-wrap:wrap; gap:14px; }
  .tz-label { color:var(--dim); font-size:0.67rem; text-transform:uppercase; letter-spacing:0.05em; margin-right:3px; }
  .tz-time { color:var(--text); font-weight:500; }

  /* Event-grid format */
  .sport-section { margin-bottom:28px; }
  .sport-heading { font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); padding-bottom:8px; margin-bottom:10px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }

  .event-card { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--border); border-radius:3px; margin-bottom:3px; overflow:hidden; transition:border-left-color 0.15s; animation:fadeIn 0.2s ease both; }
  .event-card.open { border-left-color:var(--green); }
  .event-header { display:flex; align-items:center; gap:12px; padding:12px 16px; cursor:pointer; user-select:none; transition:background 0.15s; }
  .event-header:hover { background:#1b1b1b; }
  .event-time { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:0.95rem; color:var(--accent); min-width:46px; }
  .event-name { font-weight:500; font-size:0.88rem; flex:1; }
  .event-toggle { color:var(--dim); font-size:0.7rem; transition:transform 0.2s; flex-shrink:0; }
  .event-card.open .event-toggle { transform:rotate(180deg); color:var(--green); }

  .event-channels { display:none; padding:4px 16px 14px; }
  .event-card.open .event-channels { display:block; }
  .channels-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--dim); margin-bottom:8px; }

  /* Channel cards matching the screenshot style */
  .channel-card { display:flex; align-items:baseline; gap:10px; background:#1f1f1f; border:1px solid var(--border); border-left:4px solid var(--green); padding:10px 14px; margin-bottom:6px; border-radius:3px; }
  .channel-card-name { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:1rem; letter-spacing:0.04em; color:var(--text); }
  .channel-card-cat { font-size:0.8rem; color:var(--green); font-weight:400; }
  .no-channels { font-size:0.78rem; color:var(--dim); font-style:italic; padding:4px 0; }

  .state-msg { text-align:center; color:var(--muted); font-size:0.88rem; padding:60px 20px; }
  .state-msg h2 { font-family:'Barlow Condensed',sans-serif; font-size:1.3rem; font-weight:700; color:var(--dim); margin-bottom:8px; letter-spacing:0.06em; text-transform:uppercase; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }

  @media (max-width:680px) {
    #app { grid-template-columns:1fr; }
    #sidebar { position:static; height:auto; border-right:none; border-bottom:1px solid var(--border); display:flex; flex-wrap:wrap; gap:4px; padding:10px 14px; }
    .sidebar-heading { display:none; }
    .cat-btn { width:auto; padding:5px 10px; border:1px solid var(--border); border-left:3px solid transparent; border-radius:4px; font-size:0.75rem; }
    #content { padding:18px 16px; }
    header, #filter-bar { padding-left:16px; padding-right:16px; }
    #search { width:100%; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">Sports <span>Fixtures</span></div>
  <div id="last-scraped">Loading…</div>
</header>
<div id="filter-bar">
  <input type="text" id="search" placeholder="Search fixtures, teams, events…">
  <span id="match-count"></span>
</div>
<div id="app">
  <nav id="sidebar"><div class="sidebar-heading">Categories</div><div id="cat-list"></div></nav>
  <main id="content"><div class="state-msg"><h2>Loading…</h2></div></main>
</div>

<script>
let allData=null, activeIdx=0, searchQuery="";

async function loadData() {
  try {
    const r = await fetch("fixtures.json?t="+Date.now());
    if (!r.ok) throw new Error("HTTP "+r.status);
    allData = await r.json();
    init();
  } catch(e) {
    document.getElementById("content").innerHTML =
      `<div class="state-msg"><h2>No data yet</h2><p>Run the scraper to generate fixtures.json, then refresh.</p></div>`;
  }
}

function init() {
  const d = new Date(allData.scraped_at);
  document.getElementById("last-scraped").innerHTML =
    `Last updated: <b>${d.toLocaleString("en-GB",{dateStyle:"medium",timeStyle:"short"})}</b>`;
  buildSidebar();
  renderCategory(0);
}

function countItems(cat) {
  return cat.type==="events" ? cat.events.length : cat.fixtures.length;
}

function buildSidebar() {
  const list = document.getElementById("cat-list");
  list.innerHTML = "";
  allData.categories.forEach((cat,i) => {
    const n = countItems(cat);
    const btn = document.createElement("button");
    btn.className = "cat-btn"+(n===0?" empty":"")+(i===activeIdx?" active":"");
    btn.innerHTML = `<span>${cat.name}</span><span class="cat-count">${n>0?n:"–"}</span>`;
    btn.addEventListener("click",()=>{ searchQuery=""; document.getElementById("search").value=""; renderCategory(i); });
    list.appendChild(btn);
  });
}

function renderCategory(idx) {
  activeIdx = idx;
  document.querySelectorAll(".cat-btn").forEach((b,i)=>b.classList.toggle("active",i===idx));
  const cat = allData.categories[idx];
  const q = searchQuery.toLowerCase();
  const n = countItems(cat);
  document.getElementById("match-count").textContent = n>0 ? `${n} ${cat.type==="events"?"events":"fixtures"}` : "";

  const body = cat.type==="events" ? renderEvents(cat,q) : renderPlain(cat,q);

  document.getElementById("content").innerHTML = `
    <div id="category-title">${cat.name}</div>
    <div id="category-meta">
      ${cat.last_updated?`Last updated: <b>${cat.last_updated}</b> &nbsp;·&nbsp; `:""}
      ${n} ${cat.type==="events"?"event":"fixture"}${n!==1?"s":""}
    </div>
    ${body}`;

  document.querySelectorAll(".event-header").forEach(h=>{
    h.addEventListener("click",()=>h.closest(".event-card").classList.toggle("open"));
  });
}

/* ── Plain fixtures ── */
function renderPlain(cat, q) {
  const items = q ? cat.fixtures.filter(f=>f.toLowerCase().includes(q)) : cat.fixtures;
  if (!items.length) {
    const statusMsg = {
      unavailable:"This category is currently unavailable (off-season or no data).",
      timeout:"This category timed out — the server took too long to respond.",
      error:"There was an error loading this category."
    };
    const msg = q ? `No results for "<em>${searchQuery}</em>".`
      : (statusMsg[cat.status] || "No fixtures are currently listed for this category.");
    return `<div class="state-msg"><h2>No Fixtures</h2><p>${msg}</p></div>`;
  }
  return `<div class="fixtures-list">${items.map((line,i)=>{
    const f = parseFixture(line);
    const matchHtml = f.match.replace(/ v /gi,' <span class="vs">v</span> ');
    const timesHtml = f.times.map(t=>`<span><span class="tz-label">${t.tz}</span><span class="tz-time">${t.time}</span></span>`).join("");
    return `<div class="fixture-row" style="animation-delay:${i*12}ms">
      <div class="fixture-channel">${f.channel}${f.competition?" · "+f.competition:""}</div>
      <div class="fixture-match">${matchHtml}</div>
      ${timesHtml?`<div class="fixture-times">${timesHtml}</div>`:""}
    </div>`;
  }).join("")}</div>`;
}

/* ── Event grid ── */
function renderEvents(cat, q) {
  let events = cat.events;
  if (q) events = events.filter(e=>
    e.name.toLowerCase().includes(q) ||
    e.sport.toLowerCase().includes(q) ||
    (e.channels||[]).some(c=>c.name.toLowerCase().includes(q)||c.category.toLowerCase().includes(q))
  );
  if (!events.length) {
    const msg = q ? `No events match "<em>${searchQuery}</em>".` : "No events are currently listed.";
    return `<div class="state-msg"><h2>No Events</h2><p>${msg}</p></div>`;
  }

  // Group by sport
  const bySport = {};
  events.forEach(e=>{ if(!bySport[e.sport]) bySport[e.sport]=[]; bySport[e.sport].push(e); });

  return Object.entries(bySport).map(([sport,evts],si)=>`
    <div class="sport-section">
      <div class="sport-heading"><span>${sportEmoji(sport)}</span>${sport}</div>
      ${evts.map((e,i)=>{
        const channelsHtml = (e.channels && e.channels.length)
          ? e.channels.map(c=>`
              <div class="channel-card">
                <span class="channel-card-name">${c.name}</span>
                ${c.category?`<span class="channel-card-cat">${c.category}</span>`:""}
              </div>`).join("")
          : `<div class="no-channels">No channel information available</div>`;
        return `<div class="event-card" style="animation-delay:${(si*5+i)*12}ms">
          <div class="event-header">
            <span class="event-time">${e.time||"–"}</span>
            <span class="event-name">${e.name}</span>
            <span class="event-toggle">▼</span>
          </div>
          <div class="event-channels">
            <div class="channels-label">Available on</div>
            ${channelsHtml}
          </div>
        </div>`;
      }).join("")}
    </div>`).join("");
}

function sportEmoji(sport) {
  const s = sport.toLowerCase();
  if (s.includes("football")||s.includes("soccer")) return "⚽";
  if (s.includes("baseball")) return "⚾";
  if (s.includes("basketball")) return "🏀";
  if (s.includes("tennis")) return "🎾";
  if (s.includes("rugby")) return "🏉";
  if (s.includes("golf")) return "⛳";
  if (s.includes("cricket")) return "🏏";
  if (s.includes("hockey")||s.includes("nhl")) return "🏒";
  if (s.includes("boxing")||s.includes("ufc")||s.includes("mma")) return "🥊";
  if (s.includes("darts")) return "🎯";
  if (s.includes("motor")||s.includes("nascar")||s.includes("f1")) return "🏎️";
  if (s.includes("cycle")||s.includes("cycling")) return "🚴";
  return "🏆";
}

function parseFixture(line) {
  const parts = line.split(" - ");
  let channel="",competition="",match="",timePart="";
  if (parts.length>=3) {
    channel=parts[0].trim(); competition=parts[1].trim();
    const rest=parts.slice(2).join(" - ");
    const tzIdx=rest.search(/ (Mon|Tue|Wed|Thu|Fri|Sat|Sun) \d/);
    if(tzIdx>-1){match=rest.slice(0,tzIdx).trim();timePart=rest.slice(tzIdx).trim();}
    else match=rest;
  } else if(parts.length===2) {
    channel=parts[0].trim(); match=parts[1].trim();
    const si=match.indexOf(" // ");
    if(si>-1){timePart=match.slice(si+4);match=match.slice(0,si).trim();}
  } else { match=line; }
  const times=timePart.split("//").map(s=>s.trim()).filter(Boolean).map(t=>{
    const w=t.trim().split(" ");const tz=w.pop();return{tz,time:w.join(" ")};
  });
  return{channel,competition,match,times};
}

document.getElementById("search").addEventListener("input",e=>{
  searchQuery=e.target.value.trim();
  if(allData) renderCategory(activeIdx);
});

loadData();
</script>
</body>
</html>
