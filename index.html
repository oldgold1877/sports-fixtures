<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Fixtures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0d0d;
    --surface:  #161616;
    --border:   #242424;
    --accent:   #e8ff47;
    --accent2:  #47c8ff;
    --text:     #f0f0f0;
    --muted:    #888;
    --dim:      #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    background: rgba(13,13,13,0.95);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .logo span { color: var(--accent); }

  #last-scraped {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  #last-scraped b { color: var(--accent2); font-weight: 500; }

  /* ── Filter bar ── */
  #filter-bar {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  #search {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.85rem;
    border-radius: 4px;
    width: 260px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--dim); }

  .filter-label {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-left: 8px;
  }

  /* ── Main layout ── */
  #app {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 112px);
  }

  /* ── Sidebar ── */
  #sidebar {
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 57px;
    height: calc(100vh - 57px);
    overflow-y: auto;
  }

  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-track { background: transparent; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-heading {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px 10px;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 0.82rem;
    padding: 8px 20px;
    text-align: left;
    transition: background 0.15s, color 0.15s;
    border-left: 3px solid transparent;
  }
  .cat-btn:hover { background: var(--surface); }
  .cat-btn.active {
    background: var(--surface);
    border-left-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }
  .cat-count {
    background: var(--border);
    color: var(--muted);
    font-size: 0.68rem;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 500;
  }
  .cat-btn.active .cat-count { background: var(--accent); color: #000; }

  /* ── Content area ── */
  #content {
    padding: 28px 36px;
    overflow-y: auto;
  }

  #category-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  #category-meta {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  #category-meta b { color: var(--accent2); }

  #fixtures-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .fixture-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    padding: 14px 18px;
    border-radius: 3px;
    font-size: 0.85rem;
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s;
    animation: fadeIn 0.25s ease both;
  }
  .fixture-row:hover {
    border-left-color: var(--accent);
    background: #1c1c1c;
  }

  /* Parse and highlight parts of fixture text */
  .fixture-channel {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 3px;
  }
  .fixture-match {
    font-weight: 500;
    color: var(--text);
    font-size: 0.9rem;
  }
  .fixture-match .versus {
    color: var(--accent);
    font-weight: 700;
  }
  .fixture-times {
    margin-top: 5px;
    font-size: 0.76rem;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .fixture-times .tz {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .fixture-times .tz-label {
    color: var(--dim);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .fixture-times .tz-time {
    color: var(--text);
    font-weight: 500;
  }

  /* Empty / loading states */
  .state-msg {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 60px 20px;
  }
  .state-msg h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--dim);
    margin-bottom: 8px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Mobile ── */
  @media (max-width: 700px) {
    #app { grid-template-columns: 1fr; }
    #sidebar {
      position: static;
      height: auto;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 12px 16px;
    }
    .sidebar-heading { display: none; }
    .cat-btn {
      width: auto;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: 4px;
      font-size: 0.78rem;
    }
    #content { padding: 20px 16px; }
    header { padding: 14px 16px; }
    #filter-bar { padding: 10px 16px; }
    #search { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Sports <span>Fixtures</span></div>
  <div id="last-scraped">Loading...</div>
</header>

<div id="filter-bar">
  <input type="text" id="search" placeholder="Search fixtures, teams, competitions…">
  <span class="filter-label" id="match-count"></span>
</div>

<div id="app">
  <nav id="sidebar">
    <div class="sidebar-heading">Categories</div>
    <div id="cat-list"></div>
  </nav>
  <main id="content">
    <div class="state-msg"><h2>Loading Fixtures…</h2><p>Fetching the latest data.</p></div>
  </main>
</div>

<script>
const FIXTURES_JSON = "fixtures.json";

let allData = null;
let activeCategory = 0;
let searchQuery = "";

// ── Fetch data ──────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch(FIXTURES_JSON + "?t=" + Date.now());
    if (!r.ok) throw new Error("HTTP " + r.status);
    allData = await r.json();
    init();
  } catch (e) {
    document.getElementById("content").innerHTML = `
      <div class="state-msg">
        <h2>No data yet</h2>
        <p>Run the scraper to generate fixtures.json, then refresh this page.</p>
      </div>`;
  }
}

// ── Initialise ──────────────────────────────────────────────────────
function init() {
  const d = new Date(allData.scraped_at);
  document.getElementById("last-scraped").innerHTML =
    `Last updated: <b>${d.toLocaleString("en-GB", {dateStyle:"medium", timeStyle:"short"})}</b>`;

  buildSidebar();
  renderCategory(0);
}

// ── Sidebar ─────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById("cat-list");
  list.innerHTML = "";
  allData.categories.forEach((cat, i) => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (i === activeCategory ? " active" : "");
    btn.innerHTML = `<span>${cat.name}</span><span class="cat-count">${cat.fixtures.length}</span>`;
    btn.addEventListener("click", () => {
      searchQuery = "";
      document.getElementById("search").value = "";
      renderCategory(i);
    });
    list.appendChild(btn);
  });
}

// ── Render a category ────────────────────────────────────────────────
function renderCategory(index) {
  activeCategory = index;
  // Update active state in sidebar
  document.querySelectorAll(".cat-btn").forEach((b, i) => {
    b.classList.toggle("active", i === index);
  });

  const cat = allData.categories[index];
  const filtered = filterFixtures(cat.fixtures);
  renderFixtures(cat, filtered);
}

function filterFixtures(fixtures) {
  if (!searchQuery) return fixtures;
  const q = searchQuery.toLowerCase();
  return fixtures.filter(f => f.toLowerCase().includes(q));
}

// ── Parse a fixture line into structured parts ───────────────────────
// Lines look like:
//   "GAA Plus 01: All-Ireland Football Championship Round 2A - MONAGHAN v ROSCOMMON - Sat 13/06 4:30pm UK // Sat 13/06 11:30am ET // Sat 13/06 8:30am PT"
function parseFixture(line) {
  // Split on " - " to get parts
  const parts = line.split(" - ");
  if (parts.length < 2) return { channel: "", match: line, times: [] };

  const channelPart = parts[0].trim();     // "GAA Plus 01: All-Ireland..."
  // Competition may be in parts[1], match in parts[2], times in rest
  let competition = "";
  let match = "";
  let timePart = "";

  if (parts.length === 3) {
    competition = parts[1].trim();
    // parts[2] contains "TEAMS - times" or just "times"
    const sub = parts[2].split(" - ");
    match = sub[0].trim();
    timePart = sub.slice(1).join(" - ").trim();
  } else if (parts.length === 2) {
    // "Channel: Competition - times"
    match = parts[1].trim();
    // times after "//"
    const idx = match.indexOf(" // ");
    if (idx > -1) {
      timePart = match.slice(idx + 4);
      match = match.slice(0, idx).trim();
    }
  } else {
    // Merge everything after the first dash as the match/time
    competition = parts[1].trim();
    match = parts.slice(2).join(" - ");
    const idx = match.indexOf(" // ");
    if (idx > -1) {
      timePart = match.slice(idx + 4);
      match = match.slice(0, idx).trim();
    }
  }

  // Parse times: "Sat 13/06 4:30pm UK // Sat 13/06 11:30am ET // Sat 13/06 8:30am PT"
  const rawTimes = (timePart || "").split("//").map(s => s.trim()).filter(Boolean);
  const times = rawTimes.map(t => {
    // Extract timezone label (last word)
    const words = t.split(" ");
    const tz = words.pop();
    return { tz, time: words.join(" ") };
  });

  return { channel: channelPart, competition, match, times };
}

// ── Render fixtures ──────────────────────────────────────────────────
function renderFixtures(cat, fixtures) {
  const content = document.getElementById("content");
  const count = fixtures.length;
  document.getElementById("match-count").textContent =
    count > 0 ? `${count} fixture${count !== 1 ? "s" : ""}` : "No matches";

  let html = `
    <div id="category-title">${cat.name}</div>
    <div id="category-meta">
      ${cat.last_updated ? `Last updated: <b>${cat.last_updated}</b> &nbsp;·&nbsp; ` : ""}
      ${count} fixture${count !== 1 ? "s" : ""}
    </div>
    <div id="fixtures-list">`;

  if (fixtures.length === 0) {
    html += `<div class="state-msg"><h2>No Fixtures</h2><p>${searchQuery ? "No results for "" + searchQuery + """ : "No fixtures listed for this category."}</p></div>`;
  } else {
    fixtures.forEach((line, idx) => {
      const f = parseFixture(line);
      const matchHtml = f.match.replace(/ v /gi, ' <span class="versus">v</span> ');
      const timesHtml = f.times.map(t => `
        <span class="tz">
          <span class="tz-label">${t.tz}</span>
          <span class="tz-time">${t.time}</span>
        </span>`).join("");

      html += `<div class="fixture-row" style="animation-delay:${idx * 20}ms">
        <div class="fixture-channel">${f.channel}${f.competition ? ' · ' + f.competition : ''}</div>
        <div class="fixture-match">${matchHtml}</div>
        ${timesHtml ? `<div class="fixture-times">${timesHtml}</div>` : ""}
      </div>`;
    });
  }

  html += "</div>";
  content.innerHTML = html;
}

// ── Search ───────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  if (allData) {
    const cat = allData.categories[activeCategory];
    const filtered = filterFixtures(cat.fixtures);
    renderFixtures(cat, filtered);
  }
});

// ── Boot ─────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
