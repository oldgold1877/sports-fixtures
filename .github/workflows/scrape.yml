name: Scrape Fixtures

on:
  schedule:
    # Runs every day at 7:00 AM UTC (8am UK / BST in summer)
    - cron: '0 7 * * *'
  # Also allows you to trigger it manually from the GitHub website
  workflow_dispatch:

# Grant the workflow permission to write back to the repo
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          CRISPFILES_USERNAME: ${{ secrets.CRISPFILES_USERNAME }}
          CRISPFILES_PASSWORD: ${{ secrets.CRISPFILES_PASSWORD }}
        run: python scraper.py

      - name: Commit and push updated fixtures.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fixtures.json
          git diff --staged --quiet || git commit -m "Auto-update fixtures $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
