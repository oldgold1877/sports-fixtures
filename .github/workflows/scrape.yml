name: Scrape Fixtures

on:
  schedule:
    - cron: '15 8 * * *'  # 09:15 UK (BST)
    - cron: '0 11 * * *'  # 12:00 UK (BST)
    - cron: '0 17 * * *'  # 18:00 UK (BST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          CRISPFILES_USERNAME: ${{ secrets.CRISPFILES_USERNAME }}
          CRISPFILES_PASSWORD: ${{ secrets.CRISPFILES_PASSWORD }}
        run: python scraper.py

      - name: Commit and push updated fixtures.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fixtures.json
          git diff --staged --quiet || git commit -m "Auto-update fixtures $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
